backend:
  name: git-gateway
  branch: main  # GitHub 主分支
media_folder: "images/uploads"  # 上传图片存储路径
public_folder: "/images/uploads"

collections:
  - name: "pages"       # 内容类型
    label: "Pages"
    folder: "content"   # 存放 Markdown 的文件夹
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Image", name: "image", widget: "image" }

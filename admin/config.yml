backend:
  name: git-gateway
  branch: main
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home_page"       # 改为唯一
    label: "Home Page"
    folder: "content/home"   # 可以建一个子文件夹避免冲突
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "home_title", widget: "string" }
      - { label: "Body", name: "home_body", widget: "markdown" }
      - { label: "Image", name: "home_image", widget: "image" }

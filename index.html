<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>公司官网</title>
</head>
<body>

<h1 id="title"></h1>
<p id="body"></p>
<img id="image" style="max-width:300px;" />

<script>
    fetch('/content/home.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('title').innerText = data.title;
        document.getElementById('body').innerText = data.body;
        if (data.image) {
          document.getElementById('image').src = data.image;
        }
      });
</script>

</body>
</html>

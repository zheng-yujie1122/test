backend:
  name: github
  repo: zheng-yujie1122/test  # 你的 GitHub 仓库
  branch: main
  auth_type: implicit           # 直接用 GitHub 登录

media_folder: "images/uploads"  # 上传的媒体文件存放位置
public_folder: "/images/uploads" # 网站访问路径

collections:
  - name: "pages"              # 首页页面 collection，必须唯一
    label: "页面内容"
    files:
      - label: "首页"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "内容", name: "body", widget: "text" }
          - { label: "图片", name: "image", widget: "image" }

  - name: "blog"               # 博客 collection，必须唯一
    label: "博客内容"
    files:
      - label: "文章"
        name: "article"
        file: "content/article.json"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "内容", name: "body", widget: "text" }
          - { label: "图片", name: "image", widget: "image" }